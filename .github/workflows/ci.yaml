name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run daily at midnight UTC to catch new security advisories
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      kafka:
        image: bitnamilegacy/kafka:3.7
        ports:
          - 9094:9094
        env:
          KAFKA_CFG_NODE_ID: 0
          KAFKA_CFG_PROCESS_ROLES: controller,broker
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
        options: >-
          --health-cmd "kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s

      cassandra:
        image: cassandra:latest
        ports:
          - 9042:9042
        options: >-
          --health-cmd "cqlsh -e 'SELECT cluster_name FROM system.local'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 60s

    steps:
      - uses: actions/checkout@v6

      - name: Setup Git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/

      - name: Install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake libcurl4-openssl-dev
          version: 1.0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install uniffi-bindgen-cs
        uses: baptiste0928/cargo-install@v3
        with:
          crate: uniffi-bindgen-cs
          git: https://github.com/hadronzoo/uniffi-bindgen-cs.git
          branch: fix/issue-152-pascalcase-record-properties

      - name: Install CSharpier globally (for uniffi-bindgen-cs auto-formatting)
        run: dotnet tool install -g csharpier

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build FFI and generate bindings
        run: make build-ci

      - name: Run tests
        run: dotnet run --project test/Prosody.Tests --framework net10.0 --no-build --no-launch-profile -c Release
        env:
          PROSODY_BOOTSTRAP_SERVERS: localhost:9094
          PROSODY_CASSANDRA_NODES: localhost:9042
          PROSODY_CASSANDRA_KEYSPACE: prosody_test

  dotnet-lint:
    name: .NET Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/

      - name: Install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake libcurl4-openssl-dev
          version: 1.0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install uniffi-bindgen-cs
        uses: baptiste0928/cargo-install@v3
        with:
          crate: uniffi-bindgen-cs
          git: https://github.com/hadronzoo/uniffi-bindgen-cs.git
          branch: fix/issue-152-pascalcase-record-properties

      - name: Install CSharpier globally (for uniffi-bindgen-cs auto-formatting)
        run: dotnet tool install -g csharpier

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build FFI and generate bindings
        run: make build-ci

      - name: Run C# lint
        run: make lint-csharp

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Install taplo
        uses: baptiste0928/cargo-install@v3
        with:
          crate: taplo-cli

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Check formatting
        run: make format-check

  dependencies:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/

      - name: Install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake libcurl4-openssl-dev
          version: 1.0

      - name: Setup Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-udeps
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-udeps

      - name: Check unused dependencies
        run: cargo +nightly udeps

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/

      - name: Install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake libcurl4-openssl-dev
          version: 1.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/

      - name: Install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake libcurl4-openssl-dev
          version: 1.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: make lint-rust
