# Cross compilation configuration
# See: https://github.com/cross-rs/cross

[build.env]
passthrough = ["CARGO_NET_GIT_FETCH_WITH_CLI"]
volumes = [
  "/home/runner/.config/git/credentials:/root/.config/git/credentials:ro",
]

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
pre-build = ["dpkg --add-architecture arm64 && apt-get update && apt-get install -y cmake zlib1g-dev:arm64"]

[target.aarch64-unknown-linux-gnu.env]
passthrough = [
  "CARGO_NET_GIT_FETCH_WITH_CLI",
  # Tell CMake where to find zlib installed via apt (multiarch location)
  "ZLIB_INCLUDE_DIR=/usr/include",
  "ZLIB_LIBRARY=/usr/lib/aarch64-linux-gnu/libz.a",
]
