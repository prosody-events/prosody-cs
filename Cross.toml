# Cross compilation configuration
# See: https://github.com/cross-rs/cross

[build.env]
passthrough = ["CARGO_NET_GIT_FETCH_WITH_CLI"]
volumes = [
  "/home/runner/.config/git/credentials:/root/.config/git/credentials:ro",
]

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
pre-build = [
  # Install zlib and curl for arm64, then symlink into the cross sysroot so CMake can find them
  "dpkg --add-architecture arm64 && apt-get update && apt-get install -y cmake zlib1g-dev:arm64 libcurl4-openssl-dev:arm64",
  "ln -sf /usr/include/zlib.h /usr/aarch64-linux-gnu/include/",
  "ln -sf /usr/include/zconf.h /usr/aarch64-linux-gnu/include/",
  "ln -sf /usr/lib/aarch64-linux-gnu/libz.a /usr/aarch64-linux-gnu/lib/",
  "ln -sf /usr/lib/aarch64-linux-gnu/libz.so /usr/aarch64-linux-gnu/lib/",
  "ln -sf /usr/include/aarch64-linux-gnu/curl /usr/aarch64-linux-gnu/include/curl",
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = ["CARGO_NET_GIT_FETCH_WITH_CLI"]
